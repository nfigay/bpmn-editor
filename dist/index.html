<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Semantic Process Mediator — BPMN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #app { width: 100%; height: 100vh; }

    /* ── Toolbar buttons ── */
    .tb-btn {
      background: transparent;
      color: rgba(255,255,255,0.85);
      border: none;
      padding: 4px 10px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      height: 45px;
      border-radius: 3px;
      white-space: nowrap;
      transition: background .15s;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .tb-btn-accent {
      border: 1px solid rgba(255,255,255,.25);
      color: #fff;
    }
    .tb-btn-accent:hover { background: rgba(255,255,255,.18); }

    /* ── bpmn-js fills its container ── */
    #bpmn-canvas { width: 100%; height: 100%; }
    #bpmn-props  { height: 100%; overflow-y: auto; }
    .bio-properties-panel { height: 100%; }

    /* ── Palette in left panel ── */
    .djs-palette-entries { overflow-y: auto; }
    .djs-palette .djs-palette-toggle { display: none; }

    /* ── w2ui overrides — match light theme ── */
    .w2ui-layout-box { background: #F4F6F9; }
  </style>
  <script type="module" crossorigin src="/bpmn-editor/assets/index-C8vyNsaG.js"></script>
  <link rel="stylesheet" crossorigin href="/bpmn-editor/assets/index-BcAMzvnD.css">
</head>
<body>
  <div id="app"></div>
  <input type="file" id="file-input" accept=".bpmn,.xml" style="display:none">
</body>
</html>
