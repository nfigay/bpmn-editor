<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Semantic Mediator — BPMN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }

    #app { display: flex; flex-direction: column; height: 100vh; }

    #toolbar {
      flex: 0 0 48px;
      background: #2c3e50;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
      z-index: 10;
    }
    #toolbar strong { flex: 1; font-size: 13px; letter-spacing: .05em; }
    #toolbar button {
      background: #3498db; color: white; border: none;
      padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    #toolbar button:hover { background: #2980b9; }

    #main { display: flex; flex: 1; min-height: 0; }

    #canvas {
      flex: 1;
      min-width: 0;
      min-height: 0;
      position: relative;
      background: #fff;
    }

    #properties-panel {
      width: 320px;
      border-left: 1px solid #ccc;
      overflow-y: auto;
      background: #fafafa;
    }

    .bio-properties-panel { height: 100%; }
  </style>
  <script type="module" crossorigin src="/bpmn-editor/assets/index-5bjQyLgp.js"></script>
  <link rel="stylesheet" crossorigin href="/bpmn-editor/assets/index-seEfFQUj.css">
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <strong>SEMANTIC MEDIATOR — BPMN</strong>
      <button id="btn-new">New</button>
      <button id="btn-import">Import…</button>
      <button id="btn-export">Export XML</button>
      <button id="btn-export-svg">Export SVG</button>
    </div>
    <div id="main">
      <div id="canvas"></div>
      <div id="properties-panel"></div>
    </div>
  </div>

  <input type="file" id="file-input" accept=".bpmn,.xml" style="display:none">
</body>
</html>
