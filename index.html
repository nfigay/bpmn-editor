<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Semantic Mediator — BPMN</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    #app { width: 100%; height: 100vh; }

    /* ── Toolbar ── */
    .w2ui-toolbar {
      background: #2c3e50 !important;
      border: none !important;
    }
    .w2ui-toolbar .w2ui-tb-text {
      color: #ecf0f1 !important;
    }
    .w2ui-toolbar .w2ui-tb-button:hover {
      background: rgba(255,255,255,0.15) !important;
    }
    .w2ui-toolbar .w2ui-tb-button:hover .w2ui-tb-text {
      color: #fff !important;
    }
    .w2ui-toolbar .w2ui-tb-break {
      border-left: 1px solid rgba(255,255,255,0.2) !important;
    }

    /* ── Boutons natifs dans toolbar ── */
    .tb-btn {
      background: transparent;
      color: #ecf0f1;
      border: none;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      height: 45px;
      border-radius: 3px;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.15); }
    .tb-title {
      color: #ecf0f1;
      font-weight: 700;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 0 16px;
      line-height: 45px;
      white-space: nowrap;
    }
    .tb-sep {
      display: inline-block;
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.2);
      margin: 0 4px;
      vertical-align: middle;
    }

    /* ── bpmn-js ── */
    #bpmn-canvas { width: 100%; height: 100%; }
    #bpmn-properties { height: 100%; overflow-y: auto; }
    .bio-properties-panel { height: 100%; }

    /* ── Palette panel gauche ── */
    .djs-palette-entries { overflow-y: auto; }
    .djs-palette .djs-palette-toggle { display: none; }
  </style>
  <script type="module" crossorigin src="/bpmn-editor/assets/index-CocVfedl.js"></script>
  <link rel="stylesheet" crossorigin href="/bpmn-editor/assets/index-BcAMzvnD.css">
</head>
<body>
  <div id="app"></div>
  <input type="file" id="file-input" accept=".bpmn,.xml" style="display:none">
</body>
</html>
