<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <title>Médiateur BPMN</title>
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; overflow: hidden; }
  #app { width: 100%; height: 100vh; }

  /* ── Toolbar fond sombre ── */
  .w2ui-toolbar {
    background: #2c3e50 !important;
    border: none !important;
  }

  /* ── Texte boutons toujours blanc ── */
  .w2ui-toolbar .w2ui-tb-text {
    color: #ecf0f1 !important;
  }

  /* ── Hover / focus : fond légèrement clair, texte blanc ── */
  .w2ui-toolbar .w2ui-tb-button:hover,
  .w2ui-toolbar .w2ui-tb-button.checked,
  .w2ui-toolbar .w2ui-tb-button:focus {
    background: rgba(255,255,255,0.15) !important;
  }
  .w2ui-toolbar .w2ui-tb-button:hover .w2ui-tb-text,
  .w2ui-toolbar .w2ui-tb-button.checked .w2ui-tb-text {
    color: #ecf0f1 !important;
  }

  /* ── Séparateur ── */
  .w2ui-toolbar .w2ui-tb-break {
    border-left: 1px solid rgba(255,255,255,0.2) !important;
  }

  /* ── Dropdown menu items ── */
  .w2ui-overlay .w2ui-menu-item:hover {
    background: #2980b9 !important;
    color: #fff !important;
  }

  /* ── bpmn-js ── */
  #bpmn-canvas { width: 100%; height: 100%; }
  #bpmn-properties { height: 100%; overflow-y: auto; }
  .bio-properties-panel { height: 100%; }

  /* ── Palette dans panel gauche ── */
  .djs-palette-entries { overflow-y: auto; }
  .djs-palette .djs-palette-toggle { display: none; }
</style>
  <script type="module" crossorigin src="/bpmn-editor/assets/index-BlBnC_xz.js"></script>
  <link rel="stylesheet" crossorigin href="/bpmn-editor/assets/index-BcAMzvnD.css">
</head>

<body>
  <div id="app"></div>
  <input type="file" id="file-input" accept=".bpmn,.xml" style="display:none">
</body>

</html>
